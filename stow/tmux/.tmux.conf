# set default-command to load my environment -------------------------------------------------------
if-shell 'test "$(uname -s)" = Darwin' 'set-option -g default-command "exec reattach-to-user-namespace -l zsh"'
if-shell 'test "$(uname -s)" != Darwin' 'set-option -g default-command "/bin/zsh --rcfile ~/.zshrc"'


# 256-color mode -----------------------------------------------------------------------------------
set -g default-terminal "screen-256color"


# disable the visual bell --------------------------------------------------------------------------
set -g visual-bell off


# window-related shortcuts -------------------------------------------------------------------------
# start new windows in current directory
bind-key c new-window -c "#{pane_current_path}"
# number windows from 1
set -g base-index 1
# keep window numbers sequential from 1 after closing some window
set -g renumber-windows on
# window switching: ctrl+n/m cycling & ctrl+number/special_char jumping defined in karabiner, mostly
# mapping to tmux's default "prefix > key" shortcuts. these enable some of those with non-defaults:
# jump to most recently used window
bind-key = last-window
# "0" shortcut for switching to window 10
bind-key 0 select-window -t 10
# rename window
bind-key r command-prompt -I "#W" "rename-window '%%'"


# pane-related shortcuts ---------------------------------------------------------------------------
# number panes starting from 1
setw -g pane-base-index 1
# pane creation
bind-key "\\" split-window -h -c "#{pane_current_path}"  # ctrl+\ in karabiner
bind-key "\-" split-window -v -c "#{pane_current_path}" -p 65  # ctrl+- in karabiner
# pane sizing
bind-key -n C-u resize-pane -L 10
bind-key -n C-o resize-pane -R 10
bind-key i resize-pane -U 10  # ctrl+i in karabiner
bind-key ',' resize-pane -D 10  # ctrl+, in karabiner
# equally sized panes
bind-key "\'" select-layout -E  # ctrl+' in karabiner
# pane navigation. the "if" logic is to prevent wrapping (ie, jumping from rightmost pane to
# leftmost). if good, switches and also resizes to make the newly selected one the biggest.
bind-key -n C-h run-shell "\
  if [ $(tmux display-message -p '#{pane_at_left}') -ne 1 ]; then \
    tmux select-pane -L; \
  fi"
bind-key -n C-j run-shell "\
  if [ $(tmux display-message -p '#{pane_at_bottom}') -ne 1 ]; then \
    tmux select-pane -D; \
    tmux resize-pane -y 65%; \
  fi"
bind-key -n C-k run-shell "\
  if [ $(tmux display-message -p '#{pane_at_top}') -ne 1 ]; then \
    tmux select-pane -U; \
    tmux resize-pane -y 65%; \
  fi"
bind-key -n C-l run-shell "\
  if [ $(tmux display-message -p '#{pane_at_right}') -ne 1 ]; then \
    tmux select-pane -R; \
  fi"
# pane navigation from within the scrollback buffer
bind-key -T copy-mode-vi C-h run-shell "\
  if [ $(tmux display-message -p '#{pane_at_left}') -ne 1 ]; then \
    tmux select-pane -L; \
  fi"
bind-key -T copy-mode-vi C-j run-shell "\
  if [ $(tmux display-message -p '#{pane_at_bottom}') -ne 1 ]; then \
    tmux select-pane -D; \
    tmux resize-pane -y 65%; \
  fi"
bind-key -T copy-mode-vi C-k run-shell "\
  if [ $(tmux display-message -p '#{pane_at_top}') -ne 1 ]; then \
    tmux select-pane -U; \
    tmux resize-pane -y 65%; \
  fi"
bind-key -T copy-mode-vi C-l run-shell "\
  if [ $(tmux display-message -p '#{pane_at_right}') -ne 1 ]; then \
    tmux select-pane -R; \
  fi"
bind-key -T copy-mode-vi C-u select-pane -l \; resize-pane -x 59% \


# scrollback buffer stuff --------------------------------------------------------------------------
bind-key [ copy-mode \; send-keys "k" \; send-keys "0"\; send-keys -X -N 20 cursor-up
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi M-k send-keys -X -N 25 scroll-up
bind-key -T copy-mode-vi M-j send-keys -X -N 25 scroll-down
bind-key -T copy-mode-vi M-K send-keys -X scroll-up
bind-key -T copy-mode-vi M-J send-keys -X scroll-down
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection


# various conveniences -----------------------------------------------------------------------------
# shortcut to kill sessions when they hang on exit
bind-key C-d kill-session
# Don't wait after escape is hit.
set -s escape-time 0
# Scrollback buffer size.
set -g history-limit 10000


# status bar ---------------------------------------------------------------------------------------
set -g status-bg colour94


# popup toggles ------------------------------------------------------------------------------------
bind-key Space run "#{@popup-toggle} -w60% -h70% -Ed'##{pane_current_path}'"


# TPM & Plugins ------------------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'loichyan/tmux-toggle-popup'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
