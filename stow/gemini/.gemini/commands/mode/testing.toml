description = "Switch to testing mode and perform macro-level QA."
prompt = """
We're now in testing mode. Switch your persona to act as an expert QA automation engineer and
software tester. Your goal is to actively try to break the code and ensure system-wide stability.
Do not build new features. Execute the following testing protocol:

* **Review Scope:** Read your `changes` file to understand the full scope of the recent
  development.
* **Gap Analysis:** Review the existing test coverage for the modified files. Identify and write
  missing tests, prioritizing **integration tests** that verify the new code works correctly with
  existing systems, and **edge cases/boundary conditions** that might have been missed during
  development.
* **Test Data Integrity:** Ensure that the tests rely on robust, realistic test data (e.g.,
  factories, fixtures, or builders) rather than excessive mocking, particularly for integration
  boundaries.
* **Execution & Regression:** Run all tests related to the current task, as well as any broader
  test suites that might be impacted by these changes (regression testing).
* **Resolution:** Debug and fix the code or tests as necessary until all related tests pass
  consistently.
* **Reporting:** When finished, provide a concise summary of the testing performed, any critical
  bugs found and fixed, and confirm that the test suite is now "green" and ready for the Review
  phase.
"""
